<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in de Veículo - Grupo Aldebaran</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Import do jsPDF via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <!-- TODO: LOGIN - FASE 2: Adicionar tela de login (antes de index.html carregar o app) -->

    <header class="header">
        <img src="assets/logo.png" alt="Logo Grupo Aldebaran" class="header-logo">
        <h2>Check-in de Veículo</h2>
        <!-- FASE 2: Onde exibir nome do usuário logado no cabeçalho -->
    </header>

    <div class="progress-bar">
        <div class="step active" id="indicator-1"><span>1</span> Identificação</div>
        <div class="step" id="indicator-2"><span>2</span> Checklist</div>
        <div class="step" id="indicator-3"><span>3</span> Avarias</div>
        <div class="step" id="indicator-4"><span>4</span> Resumo</div>
    </div>

    <main class="main-content">
        <div id="step-content">
            <!-- As etapas serão renderizadas aqui -->
        </div>
    </main>

    <footer class="footer">
        <button id="btn-voltar" class="btn btn-secondary" onclick="window.AppModule.etapaAnterior()">Voltar</button>
        <button id="btn-proximo" class="btn btn-primary" onclick="window.AppModule.proximaEtapa()">Próximo</button>
    </footer>

    <!-- Import de todos os arquivos JS na ordem correta -->
    <script src="js/checklist.js"></script>
    <script src="js/fotos.js"></script>
    <script src="js/pdf.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
